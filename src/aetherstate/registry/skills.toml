# Curated skills (doc 06 §3.3). Effective check mod (baked into the check op at resolve):
#   stat_mod(keyed_stat) + base_mod + player.skills[id] + passive-ability mods naming the skill.
# `governs` verbs help the linter bind a narrated result to this check (outcome_match subject).
[stealth]
name = "Stealth"
keyed_stat = "DEX"
base_mod = 0
max_rank = 5
governs = ["sneaking", "sneak", "hiding", "hide", "moving silently", "slip past", "creep"]
desc = "Avoiding detection."

[swordplay]
