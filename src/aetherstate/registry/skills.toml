# RPG-3: a BASIS-GATED skill (the eligibility gate, doc 10). Anyone may TRY to sneak or
# persuade — but spellcraft has no in-world basis without the granting ability. A check
# declared without it is a NON-MOVE (visible notice, no roll); the ability is acquired
# in-world (quest/ritual/user grant via ability_grant), never asserted into existence.
[spellcraft]
name = "Spellcraft"
keyed_stat = "INT"
base_mod = 0
max_rank = 5
requires_ability = "arcane_gift"
cost = { mana = 2 }
governs = ["cast", "spell", "channel", "mana", "weave", "incant", "conjure"]
desc = "Shaping magic. Requires the Arcane Gift — you cannot declare power; you acquire it."
