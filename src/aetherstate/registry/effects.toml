# Curated Status & Condition presets (RPG-3, doc 05 §5.4). The guaranteed grounding FLOOR:
# these fire even when the narrating model never thinks to tag them, because extraction and
# the tag protocol both resolve names against this table first (open vocabulary is layered on
# top — an unknown name still commits, it just carries no engine-side mechanics).
#
# Schema per entry:
#   name     display name (tag/extraction tokens resolve by id OR name, case-insensitive)
#   kind     "status" (combat-facing buff/debuff) | "condition" (anything else in-world)
#   valence  DEFAULT valence: negative | neutral | positive — dynamic; effect_update shifts it
#   mods     optional int check-mods keyed by SKILL id, or "all" for every check (engine-owned;
#            baked into the ledger record at apply — editing this file never rewrites history)
#   duration optional lifetime in TURNS (omit = until removed); expiry is DERIVED from
#            gained_turn + duration, never mutated (replay purity)
#   requires optional gate: "female" = only female characters (sex attribute / pronouns)
#   desc     narration hint only — never parsed for mechanics

# ---- Statuses (combat-facing) -------------------------------------------------------
[bleeding]
name = "Bleeding"
kind = "status"
valence = "negative"
mods = { all = -1 }
duration = 6
desc = "An open wound; blood loss saps every effort."

[poisoned]
name = "Poisoned"
kind = "status"
valence = "negative"
mods = { all = -1 }
duration = 8
desc = "Venom works through the body."

[stunned]
name = "Stunned"
kind = "status"
valence = "negative"
mods = { all = -3 }
duration = 1
desc = "Reeling; barely able to act."

[blinded]
name = "Blinded"
kind = "status"
valence = "negative"
mods = { perception = -3, archery = -2 }
duration = 3
desc = "Sight lost or fouled."

[burning]
name = "Burning"
kind = "status"
valence = "negative"
mods = { all = -1 }
duration = 2
desc = "On fire — pain and panic."

[chilled]
