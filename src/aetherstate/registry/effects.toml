[slowed]
name = "Slowed"
kind = "status"
valence = "negative"
mods = { all = -1 }
duration = 3
desc = "Limbs drag as if through water."

[hasted]
name = "Hasted"
kind = "status"
valence = "positive"
mods = { all = 1 }
duration = 3
desc = "Supernaturally quick."

[empowered]
name = "Empowered"
kind = "status"
valence = "positive"
mods = { all = 1 }
duration = 3
desc = "Surging with borrowed strength."

[shielded]
name = "Shielded"
kind = "status"
valence = "positive"
duration = 3
desc = "Warded against harm."

[regenerating]
name = "Regenerating"
kind = "status"
valence = "positive"
duration = 5
desc = "Wounds knit closed on their own."

