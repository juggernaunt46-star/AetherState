<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AetherState Console</title>
<style>
:root{--bg:#13141a;--panel:#1c1e27;--edge:#2b2e3b;--fg:#dde1ec;--dim:#8b90a5;--acc:#7aa2f7;
 --ok:#9ece6a;--warn:#e0af68;--bad:#f7768e;--vio:#bb9af7;--r:9px}
*{box-sizing:border-box}
body{margin:0;font:14px/1.5 system-ui,sans-serif;background:var(--bg);color:var(--fg)}
header{position:sticky;top:0;z-index:5;display:flex;gap:10px;align-items:center;
 padding:9px 14px;background:var(--panel);border-bottom:1px solid var(--edge);flex-wrap:wrap}
h1{font-size:15px;margin:0 8px 0 0;color:var(--acc)}
nav{display:flex;gap:2px}
nav button{background:none;border:none;color:var(--dim);padding:6px 11px;cursor:pointer;
 font-size:13px;border-radius:6px}
nav button.on{color:var(--fg);background:var(--edge)}
select,input,textarea{background:var(--bg);color:var(--fg);border:1px solid var(--edge);
 border-radius:6px;padding:5px 8px;font-size:13px;max-width:100%}
main{padding:14px;max-width:1100px;margin:0 auto}
.card{background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);
 padding:12px 14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.pill{display:inline-block;padding:1px 9px;border-radius:9px;font-size:11.5px;margin:1px}
.ok{background:#20301f;color:var(--ok)}.bad{background:#3a2030;color:var(--bad)}
.warn{background:#38301c;color:var(--warn)}.dim{background:var(--edge);color:var(--dim)}
.vio{background:#2c2440;color:var(--vio)}
.bar{height:7px;border-radius:4px;background:var(--edge);overflow:hidden;flex:1;min-width:60px}
.bar i{display:block;height:100%;border-radius:4px}
.meter{display:flex;gap:8px;align-items:center;margin:3px 0;font-size:12.5px}
.meter b{width:96px;font-weight:500;color:var(--dim);flex-shrink:0}
.meter em{width:34px;font-style:normal;text-align:right;color:var(--dim);font-size:11.5px}
button.act{background:var(--acc);color:#0f1117;border:none;border-radius:6px;
 padding:6px 14px;cursor:pointer;font-weight:600;font-size:13px}
button.mini{background:var(--edge);color:var(--fg);border:none;border-radius:5px;
 padding:1px 8px;cursor:pointer;font-size:12px}
button.mini:hover{background:var(--acc);color:#0f1117}
button.danger{background:var(--bad);color:#14151a}
button.good{background:var(--ok);color:#14151a}
table{border-collapse:collapse;width:100%}
td,th{padding:4px 9px;text-align:left;border-bottom:1px solid var(--edge);font-size:13px}
th{color:var(--dim);font-weight:500}
pre{white-space:pre-wrap;font-size:12px;background:var(--bg);padding:10px;border-radius:7px;
 border:1px solid var(--edge);max-height:480px;overflow:auto}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin:7px 0}
label.sw{display:inline-flex;gap:6px;align-items:center;cursor:pointer;color:var(--dim);font-size:13px}
.hint{color:var(--dim);font-size:12px}
h3{margin:2px 0 8px;font-size:13.5px;color:var(--acc)}
h4{margin:0 0 6px;font-size:14px}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--edge);border-radius:7px;
 padding:2px 8px;font-size:12px;margin:2px}
.chip button{background:none;border:none;color:var(--bad);cursor:pointer;font-size:13px;padding:0}
.formgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px}
.field{display:flex;flex-direction:column;gap:3px;font-size:12.5px;color:var(--dim)}
.zones{display:flex;flex-wrap:wrap;gap:4px}
.zones label,.mchar label{display:inline-flex;gap:4px;align-items:center;background:var(--bg);
 border:1px solid var(--edge);border-radius:6px;padding:2px 7px;font-size:12px;cursor:pointer}
.zones label:has(input:checked),.mchar label:has(input:checked){border-color:var(--acc);color:var(--fg)}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--panel);
 border:1px solid var(--acc);border-radius:8px;padding:9px 18px;display:none;z-index:9;
 max-width:80vw;font-size:13px}
.opsel{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.opsel button{background:var(--bg);border:1px solid var(--edge);color:var(--dim);
 border-radius:7px;padding:4px 11px;cursor:pointer;font-size:12.5px}
.opsel button.on{border-color:var(--acc);color:var(--fg)}
.plpicker{position:relative;min-width:300px;flex:1}
.plpicker>input{width:100%}
.plchoices{position:absolute;z-index:8;left:0;right:0;top:calc(100% + 3px);max-height:260px;
 overflow:auto;background:var(--panel);border:1px solid var(--edge);border-radius:7px;box-shadow:0 8px 24px #0008}
.plchoices:empty{display:none}
.plchoices button{display:block;width:100%;padding:7px 9px;text-align:left;background:var(--panel);
 color:var(--fg);border:0;border-bottom:1px solid var(--edge);cursor:pointer}
.plchoices button:hover{background:var(--edge)}
.lessonitem{border-top:1px solid var(--edge);padding:11px 0}
.lessonitem:first-child{border-top:0;padding-top:2px}
.lessoncopy{white-space:pre-wrap;background:var(--bg);border:1px solid var(--edge);border-radius:6px;
 padding:7px 9px;margin:5px 0;color:var(--fg);width:100%}
textarea.lessoncopy{min-height:86px}
</style>
</head>
<body>
<header>
  <h1>AetherState</h1>
  <nav id="tabs"></nav>
  <span style="flex:1"></span>
  <button class="act danger" id="btnFreeze" style="display:none">FREEZE</button>
  <button class="act good" id="btnResume" style="display:none">RESUME</button>
  <label class="sw" title="Allows edits that push things forward (consent up, drives up). Safety-direction edits are always allowed."><input type="checkbox" id="ovr"> override</label>
  <select id="sess"></select>
</header>
<main id="view"></main>
<div id="toast"></div>
<script>
"use strict";
/* ---------- constants (mirror the engine's vocabulary) ---------- */
const ZONES=["head","face","mouth","neck","shoulders","chest","breasts","nipples","back","arms",
 "wrists","hands","waist","hips","ass","anus","genitals","thighs","legs","feet"];
const WORN=["base_layer","top","bottom","outerwear","footwear","headwear","handwear","facewear",
 "eyewear","neckwear","armor"];
const CARRIED=["load_bearing","backpack","pouch","tool","weapon","ammunition","consumable",
 "medical","electronics","accessory"];
const PHASES=["setup","rising","climax","resolution"];
const TIMES=["dawn","morning","midday","afternoon","evening","night","late_night"];
const DIMS=["trust","affection","respect","desire","tension","fear","familiarity"];
const CATS=["kissing","manual","oral_give","oral_receive","vaginal","anal","toys","restraint",
 "impact","degradation","praise","exhibition","group","roleplay_scene","other"];
const LEVELS=["unknown","hesitant","granted","enthusiastic","soft_limit","hard_limit","withdrawn"];
const SIGNALS=["grant","enthusiastic","hesitant","refuse","withdraw"];
const POSES=["standing","sitting","kneeling","straddling","lying_back","lying_front",
 "on_all_fours","bent_over","held_carried"];
const TOUCH=["touching","caressing","gripping","kissing","licking","sucking","penetrating",
 "grinding","restraining","impact"];
const FLAVORS=["romantic","possessive","protective","hostile","curious","ambition","reverent","other"];
const TKINDS=["entity","act_category","substance","object","concept"];
const TABS=["Player","PlayerLex","Player Lessons","Overview","Edit","Sessions","Connection","Status","Models","Raw"];
/* ---------- app state ---------- */
let tab="Player",sid="",S=null,editOp="scene_set",timer=null,PL=[],PL_EDIT="",
 PL_CONCEPT=null,PL_CHOICES=[],PL_NEXT_CURSOR=null,PL_SEARCH_TIMER=null,PL_SEARCH_SEQ=0,
 LESSONS=[],LESSON_EDIT="",LESSON_ANCHORS=[],LESSON_SELECTIONS=[],LESSON_SELECTION_ERROR="",
 LESSON_APPLICATIONS=[],LESSON_APPLICATION_ERROR="",
 LESSON_LOAD_SEQ=0,
 RENDER_SEQ=0;
const $=q=>document.querySelector(q);
const esc=t=>String(t??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const uniqueDisplayProse=values=>{const out=[],seen=new Set();for(const raw of values||[]){
 if(typeof raw!=="string")continue;const text=raw.trim(),key=text.replace(/\s+/g," ").toLowerCase();
 if(!key||seen.has(key))continue;seen.add(key);out.push(text)}return out};
const j=async(u,o)=>{const r=await fetch(u,o);return r.json()};
function toast(msg,bad){const t=$("#toast");t.textContent=msg;
 t.style.borderColor=bad?"var(--bad)":"var(--acc)";t.style.display="block";
 clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",3500)}
async function ops(list){if(!sid)return toast("no session yet — open a chat first",1);
 try{const d=await j(`/aether/session/${sid}/state`,{method:"PATCH",
  headers:{"content-type":"application/json"},body:JSON.stringify({ops:list})});
  const rej=(d.rejected||[]).map(r=>r.reason).join("; ");
  toast(`applied ${d.applied||0}`+(rej?` · rejected: ${rej}`:""),!d.applied&&rej);
  await load();render()}catch(e){toast("error: "+e,1)}}
/* ---------- data ---------- */
async function sessions(){const d=await j("/aether/sessions");const s=d.sessions||[];
 $("#sess").innerHTML=s.length?s.map(x=>`<option value="${x.session_id}" ${x.session_id===sid?"selected":""}>`+
  `${esc(x.label||(x.external_id||x.session_id).slice(0,20))} · t${x.head_turn??"?"}</option>`).join("")
  :`<option value="">no sessions yet</option>`;
 if(!sid&&s.length)sid=s[0].session_id;return s}
let J=null;   /* RPG-4: journal tail for the activity feed */
let HUD=null; /* 2026-07-07: the resolved player-facing view — SAME payload the ST HUD renders */
const PRIVILEGED_STATE_TABS=new Set(["Overview","Edit"]);
async function load(privileged=PRIVILEGED_STATE_TABS.has(tab)){if(!sid){S=null;J=null;HUD=null;return}
 /* Player and Raw never request owner/debug state or journal prose. */
 if(privileged){
  try{S=await j(`/aether/session/${sid}/state`)}catch(e){S=null}
  try{J=await j(`/aether/session/${sid}/journal?limit=25`)}catch(e){J=null}
 }else{S=null;J=null}
 try{HUD=await j(`/aether/session/${sid}/hud`)}catch(e){HUD=null}}
const chars=()=>Object.entries(S?.state?.entities||{});
const cnames=()=>chars().map(([id,e])=>[id,e.name||id]);
const nameOf=id=>(S?.state?.entities?.[id]?.name)||id;
/* ---------- header ---------- */
function headerRefresh(){const source=S||HUD,f=source?.frozen;
 $("#btnFreeze").style.display=source&&!f?"":"none";
 $("#btnResume").style.display=source&&f?"":"none"}
$("#btnFreeze").onclick=async()=>{await j(`/aether/session/${sid}/freeze`,{method:"POST"});await load();headerRefresh();render();toast("scene frozen — aftercare register active")};
$("#btnResume").onclick=async()=>{await j(`/aether/session/${sid}/unfreeze`,{method:"POST"});await load();headerRefresh();render();toast("scene resumed")};
$("#ovr").onchange=async e=>{await j("/aether/override",{method:"POST",
 headers:{"content-type":"application/json"},body:JSON.stringify({enabled:e.target.checked})});
 toast(e.target.checked?"manual override ON — forward edits allowed":"manual override OFF")};
$("#sess").onchange=async e=>{sid=e.target.value;await load();headerRefresh();render()};
/* ---------- widgets ---------- */
const bar=(v,max,col)=>`<span class="bar"><i style="width:${max?Math.max(0,Math.min(100,100*v/max)):0}%;background:${col}"></i></span>`;
const meter=(label,v,max,col)=>`<div class="meter"><b>${esc(label)}</b>${bar(v,max,col)}<em>${esc(v)}</em></div>`;
const resourceLabel=(id,r)=>String((r&&r.name)||id||"").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
const resourceColor=(id,r)=>{const c=String((r&&r.color)||"");if(/^#[0-9a-f]{6}$/i.test(c))return c.toLowerCase();
 return id==="hp"?"var(--bad)":id==="mana"?"var(--vio)":id==="stamina"?"var(--ok)":"var(--acc)"};
const resourceMeter=(id,r)=>{if(!r||!r.max)return "";const cur=r.cur??r.current??r.max;
 return `<div class="meter"><b>${esc(resourceLabel(id,r))}</b>${bar(cur,r.max,resourceColor(id,r))}<em>${esc(cur)}/${esc(r.max)}</em></div>`};
const moodWord=v=>v>=45?"bright":v>=15?"warm":v>-15?"level":v>-45?"low":"dark";
const energyWord=v=>v>=45?"charged":v>=15?"lively":v>-15?"steady":v>-45?"tired":"drained";
/* ---------- Overview ---------- */
function overview(){if(!S)return `<div class="card">No session selected — open a chat in
 SillyTavern (or send one message) and it appears here.</div>`;
 const st=S.state,sc=st.scene||{},ck=st.clock||{};
 let h=`<div class="card"><h3>Scene</h3><div class="row">
  <span class="pill vio">${esc(sc.location_id||"nowhere yet")}</span>
  <span class="pill dim">${esc(sc.phase||"setup")}</span>
  <span class="pill dim">day ${ck.day??1} · ${esc(ck.time_of_day||"?")}</span>
  ${sc.mode&&sc.mode!=="live"?`<span class="pill warn">${esc(sc.mode)}</span>`:""}
  ${S.frozen?`<span class="pill bad">FROZEN${S.state.frozen_reason?" · "+esc(S.state.frozen_reason):""}</span>`:""}
  <span style="flex:1"></span><span class="hint">turn ${S.head_turn}</span></div>
  ${meter("tension",sc.tension||0,100,"var(--bad)")}
  ${meter("intimacy",sc.intimacy||0,100,"var(--vio)")}</div>`;
 /* player card (RPG) — 2026-07-06: the committed Player Card is finally visible */
 for(const [pid,p] of Object.entries(st.player||{})){
  const pname=st.entities?.[pid]?.name||pid;
  h+=`<div class="card"><h3>Player — ${esc(pname)}${p.level?` <span class="pill vio">lv ${p.level}</span>`:""}${p.concept?` <span class="pill dim">${esc(p.concept)}</span>`:""}</h3>`;
  if(p.stats)h+=`<div class="row">`+Object.entries(p.stats).map(([k,v])=>`<span class="pill dim">${esc(k)} ${v}</span>`).join("")+`</div>`;
  const sk=Object.entries(p.skills||{}).filter(([,v])=>v>0);
  if(sk.length)h+=`<div class="row"><span class="hint">skills:</span>`+sk.map(([k,v])=>`<span class="pill vio">${esc(k)} r${v}</span>`).join("")+`</div>`;
  if((p.abilities||[]).length)h+=`<div class="row"><span class="hint">abilities:</span>`+p.abilities.map(x=>`<span class="pill ok">${esc(x)}</span>`).join("")+`</div>`;
  const defs=p.defs||{};const dn=[...Object.values(defs.skills||{}),...Object.values(defs.abilities||{})].map(x=>x.name).filter(Boolean);
  if(dn.length)h+=`<div class="row"><span class="hint">custom (frozen):</span>`+dn.map(x=>`<span class="pill warn">${esc(x)}</span>`).join("")+`</div>`;
  const hp=p.hp||p.resources?.hp;h+=resourceMeter("hp",hp);
  for(const [id,r] of Object.entries(p.resources||{}))if(id!=="hp")h+=resourceMeter(id,r);
  h+=`</div>`}
 /* characters */
 h+=`<div class="grid">`;
 for(const [id,e] of chars()){const c=st.chars?.[id]||{};const a=c.arousal||{};const af=c.affect||{};
  const worn=[],carried=[];
  for(const [item,g] of Object.entries(st.clothing?.[id]||{})){
   if(g.state==="removed"||g.state==="destroyed")continue;
   ((g.category&&CARRIED.includes(g.category))?carried:worn).push([item,g])}
  h+=`<div class="card"><div class="row" style="margin-top:0"><h4>${esc(e.name||id)}</h4>
   ${e.present?`<span class="pill ok">present</span>`:`<span class="pill dim">away${e.location?" · "+esc(e.location):""}</span>`}
   <span style="flex:1"></span>
   <span class="hint">${moodWord(af.valence||0)} · ${energyWord(af.energy||0)}</span></div>`;
  if((a.arousal||0)>0)h+=meter("arousal",a.arousal||0,100,"var(--warn)");
  for(const [k,o] of Object.entries(c.obsessions||{}))
   h+=`<div class="meter"><b title="${esc(k)}">☄ ${esc(o.target)}</b>${bar(o.intensity,100,"var(--vio)")}
    <em>${o.intensity}</em><button class="mini" onclick='ops([{op:"obsession",char:${JSON.stringify(id)},target_kind:${JSON.stringify(o.target_kind)},target:${JSON.stringify(o.target)},delta:10}])'>+</button>
    <button class="mini" onclick='ops([{op:"obsession",char:${JSON.stringify(id)},target_kind:${JSON.stringify(o.target_kind)},target:${JSON.stringify(o.target)},delta:-10}])'>−</button></div>`;
  for(const [sub,cr] of Object.entries(c.cravings||{}))
   h+=`<div class="meter"><b>♦ ${esc(sub)}</b>${bar(cr.level,100,"var(--bad)")}<em>${cr.level}</em>
    <button class="mini" title="consume: −satisfaction" onclick='ops([{op:"craving",char:${JSON.stringify(id)},substance:${JSON.stringify(sub)},action:"consume"}])'>sate</button>
    <button class="mini" onclick='ops([{op:"craving",char:${JSON.stringify(id)},substance:${JSON.stringify(sub)},action:"adjust",delta:10}])'>+</button></div>`
   +((cr.dependency||0)>0?meter("└ dependency",cr.dependency,100,"var(--warn)"):"");
  const effs=Object.entries(st.effects?.[id]||{});   /* RPG-3: Status/Condition ledger */
  if(effs.length)h+=`<div class="row"><span class="hint">effects:</span>`+effs.map(([fk,f])=>{
   const live=f.duration==null||(f.gained_turn||0)+f.duration>(st.meta?.turn??S.head_turn??0);
   const glyph=f.valence==="negative"?"▼":f.valence==="positive"?"▲":"◆";
   const col=f.valence==="negative"?"var(--bad)":f.valence==="positive"?"var(--ok)":"var(--dim)";
   const tip=(f.kind||"condition")+(f.duration!=null?` · ${f.duration}t`:"")+(f.note?` · ${f.note}`:"")+(live?"":" · EXPIRED");
   return `<span class="chip" title="${esc(tip)}"${live?"":' style="opacity:.45"'}><b style="color:${col}">${glyph}</b> ${esc(f.name||fk)}${(f.stacks||1)>1?" ×"+f.stacks:""}
    <button title="remove" onclick='ops([{op:"effect_remove",char:${JSON.stringify(id)},effect:${JSON.stringify(fk)}}])'>×</button></span>`}).join("")+`</div>`;
  if(worn.length)h+=`<div class="row"><span class="hint">worn:</span>`+worn.map(([item,g])=>
   `<span class="chip" title="${esc((g.covers||[]).join(", ")||"covers nothing")}">${esc(item)}${g.state!=="worn"?" ("+esc(g.state)+")":""}
    <button title="remove" onclick='ops([{op:"clothing",char:${JSON.stringify(id)},item:${JSON.stringify(item)},action:"remove"}])'>×</button></span>`).join("")+`</div>`;
  if(carried.length)h+=`<div class="row"><span class="hint">carrying:</span>`+carried.map(([item])=>
   `<span class="chip">${esc(item)}<button title="drop" onclick='ops([{op:"clothing",char:${JSON.stringify(id)},item:${JSON.stringify(item)},action:"remove"}])'>×</button></span>`).join("")+`</div>`;
  const goals=(c.goals||[]).filter(g=>!g.done&&g.text!==undefined?true:typeof g==="string");
  if(goals.length)h+=`<div class="hint">goals: ${goals.map(g=>esc(g.text||g)).join(" · ")}</div>`;
  h+=`</div>`}
 h+=`</div>`;
 /* RPG-3b: affinity ledgers, bonds, factions, world flags */
 const aff=Object.entries(st.affinity||{});
 const pl0=Object.values(st.player||{})[0]||{};
 if(aff.length||pl0.soulmate||pl0.nemesis){h+=`<div class="card"><h3>Relations (RPG)</h3>`;
  const affTier=v=>v>=80?"Devoted":v>=40?"Ally":v>=10?"Warm":v>=-9?"Neutral":v>=-39?"Cold":v>=-79?"Hostile":"Nemesis";
  const shown=new Set();
  for(const [k,a] of aff){const b=k.split("->")[1];shown.add(b);
   const val=a.value||0,tier=a.tier||affTier(val);
   const bond=pl0.soulmate===b?"♥ soulmate":pl0.nemesis===b?"☠ nemesis":"";
   const cls=val>=40?"ok":val<=-40?"bad":"dim";
   const last=(a.ledger&&a.ledger.length)?a.ledger[a.ledger.length-1]:null;
   h+=`<div class="row"><b style="font-weight:500">${esc(nameOf(b))}</b>
    <span class="pill ${cls}" title="clamped ledger sum">${esc(tier)} · ${val}</span>
    ${a.kind==="faction"?`<span class="pill dim">faction</span>`:""}
    ${bond?`<span class="pill vio">${bond}</span>`:""}
    ${(a.labels||[]).map(l=>`<span class="pill warn">${esc(l)}</span>`).join("")}
    <button class="mini" title="needs override ON" onclick='ops([{op:"affinity_adj",target:${JSON.stringify(b)},delta:5,reason:"console nudge"}])'>+</button>
    <button class="mini" title="needs override ON" onclick='ops([{op:"affinity_adj",target:${JSON.stringify(b)},delta:-5,reason:"console nudge"}])'>−</button>
    ${last?`<span class="hint" title="latest ledger entry">t${last.turn}: ${last.delta>0?"+":""}${last.delta}${last.reason?" · "+esc(last.reason):""}</span>`:""}</div>`}
  for(const [b,g] of [[pl0.soulmate,"♥ soulmate"],[pl0.nemesis,"☠ nemesis"]])
   if(b&&![...shown].some(x=>x===b))h+=`<div class="row"><b style="font-weight:500">${esc(nameOf(b))}</b><span class="pill vio">${g}</span></div>`;
  h+=`</div>`}
 const facs=Object.entries(st.factions||{});const wflags=Object.entries(st.world||{});
 if(facs.length||wflags.length){h+=`<div class="card"><h3>Factions &amp; world</h3>`;
  for(const [fid,f] of facs){const circ=Object.entries(f.circumstances||{});
   h+=`<div class="row"><b style="font-weight:500">${esc(f.name||nameOf(fid))}</b>`+
    (circ.length?circ.map(([k,v])=>`<span class="chip">${esc(k)}=${esc(String(v))}
     <button title="clear" onclick='ops([{op:"world_flag",key:${JSON.stringify(k)},value:null,faction:${JSON.stringify(fid)}}])'>×</button></span>`).join("")
    :`<span class="hint">no standing circumstances</span>`)+`</div>`}
  if(wflags.length)h+=`<div class="row"><span class="hint">world:</span>`+wflags.map(([k,v])=>
   `<span class="chip">${esc(k)}=${esc(String(v))}

 if(cons.length){h+=`<div class="card"><h3>Consent</h3><table><tr><th>between</th><th>act</th><th>level</th><th>cap</th></tr>`;
  for(const [k,c] of cons){const [a,b,cat]=k.split("|");
   const cls=["granted","enthusiastic"].includes(c.level)?"ok":["hard_limit","withdrawn"].includes(c.level)?"bad":"warn";
   h+=`<tr><td>${esc(nameOf(a))} ↔ ${esc(nameOf(b))}</td><td>${esc(cat)}</td>

  h+=`</table></div>`}
 const mems=(st.memories||[]).slice(-6).reverse();
 if(mems.length)h+=`<div class="card"><h3>Recent memories</h3>`+
  mems.map(m=>`<div class="hint">t${m.turn} · ${esc(m.text)}</div>`).join("")+`</div>`;
 /* RPG-4: visible roll + state-change feedback (doc 05 §9 inspectors) */
 const je=(J&&J.entries)||[],jr=(J&&J.rolls)||[];
 if(je.length||jr.length){h+=`<div class="card"><h3>Recent activity (RPG)</h3>`;
  if(jr.length)h+=`<div class="row"><span class="hint">rolls:</span>`+jr.slice(-6).reverse().map(r=>
   `<span class="chip">t${r.turn} · ${esc(String(r.spec))} → ${esc(String(r.result))}</span>`).join("")+`</div>`;
  h+=je.slice(0,14).map(e=>{const b=Object.entries(e.brief||{}).map(([k,v])=>`${esc(k)}=${esc(String(v))}`).join(" · ");
   return `<div class="hint">t${e.turn} · <b>${esc(e.op||"?")}</b> <span class="pill dim">${esc(e.source||"")}</span>${b?" · "+b:""}</div>`}).join("");
  h+=`</div>`}
 return h}

 h+=`</div><div id="opform">${form(editOp)}</div>

function form(key){const d=F[key];let h=`<div class="formgrid">`;
 for(const [k,label,type,opts] of d.f){
  if(type==="text")h+=`<label class="field">${label}<input data-k="${k}"></label>`;
  else if(type==="num")h+=`<label class="field">${label}<input data-k="${k}" type="number"></label>`;
  else if(type==="check")h+=`<label class="field">${label}<input data-k="${k}" type="checkbox" style="width:18px;height:18px"></label>`;
  else if(type==="sel")h+=`<label class="field">${label}<select data-k="${k}"><option value=""></option>`+
   opts.map(o=>`<option>${o}</option>`).join("")+`</select></label>`;
  else if(type==="char")h+=`<label class="field">${label}<select data-k="${k}"><option value=""></option>`+
   cnames().map(([id,n])=>`<option value="${esc(n)}">${esc(n)}</option>`).join("")+`</select></label>`;
  else if(type==="mchar")h+=`<div class="field">${label}<div class="mchar" data-k="${k}">`+
   cnames().map(([id,n])=>`<label><input type="checkbox" value="${esc(n)}">${esc(n)}</label>`).join("")+`</div></div>`;
  else if(type==="zones")h+=`<div class="field" style="grid-column:1/-1">${label}<div class="zones" data-k="${k}">`+
   ZONES.map(z=>`<label><input type="checkbox" value="${z}">${z}</label>`).join("")+`</div></div>`}
 return h+`</div>`}
function applyForm(){const d=F[editOp];const op={op:d.op||editOp,...(d.fix||{})};
 for(const [k,,type] of d.f.map(f=>[f[0],f[1],f[2]])){
  const el=document.querySelector(`#opform [data-k="${k}"]`);if(!el)continue;
  if(type==="mchar"||type==="zones"){const v=[...el.querySelectorAll("input:checked")].map(i=>i.value);
   if(v.length)op[k]=v}
  else if(type==="check")op[k]=el.checked;
  else if(type==="num"){if(el.value!=="")op[k]=Number(el.value)}
  else if(el.value)op[k]=el.value}
 for(const k of d.nulls||[])if(!(k in op))op[k]=null;  /* required-but-clearable fields */
 ops([op])}

  h+=`</div>`}
 if((v.relationships||[]).length)h+=`<div class="card"><h3>Relationships</h3>`+v.relationships.map(r=>`<div class="row"><b style="font-weight:500">${esc(r.a)} → ${esc(r.b)}</b>`+r.dims.map(d=>`<span class="pill ${d.val>=45?"vio":d.val<=-30?"bad":"dim"}">${esc(d.dim)} ${d.val>=0?"+":""}${d.val}</span>`).join("")+(r.world_modifier!=null?`<span class="pill vio">World modifier ${r.world_modifier>=0?"+":""}${esc(r.world_modifier)}</span>`:"")+`</div>`).join("")+`</div>`;
 if((v.quests||[]).length)h+=`<div class="card"><h3>Quests</h3>`+v.quests.map(q=>`<div class="row"><b style="font-weight:600">${esc(q.name)}</b>${q.stakes?`<span class="pill warn">${esc(q.stakes)}</span>`:""}<span class="pill ${q.available===false?"bad":q.status==="active"?"dim":q.status==="complete"?"ok":"bad"}">${q.available===false?"unavailable due to world change":esc(q.status)}</span>${q.note?`<span class="hint">${esc(q.note)}</span>`:""}</div>`).join("")+`</div>`;
 if((v.rolls||[]).length)h+=`<div class="card"><h3>Dice &amp; Checks</h3>`+v.rolls.slice().reverse().map(r=>`<div class="row"><span class="pill dim">t${r.turn??"?"}</span><b>${esc(r.skill||r.spec||"roll")}</b>${r.spec?`<span class="hint">${esc(r.spec)}</span>`:""}<span class="pill vio">= ${esc(r.result)}</span>${r.tier_label?`<span class="pill ${(r.tier==="fail"||r.tier==="crit_fail")?"bad":r.tier==="partial"?"warn":"ok"}">${esc(r.tier_label)}</span>`:""}</div>`).join("")+`</div>`;
 const rel=[...(v.relations||[]),...(v.factions||[]).map(f=>Object.assign({fac:true},f))];
 if(rel.length)h+=`<div class="card"><h3>Relations &amp; Factions</h3><div class="row">`+rel.map(r=>`<span class="pill ${r.fac?"dim":"vio"}">${r.fac?"⚑ ":""}${esc(r.name)} · ${esc(r.tier)}${r.reputation_modifier!=null?` · Reputation ${r.reputation_modifier>=0?"+":""}${esc(r.reputation_modifier)}`:""}${r.world_circumstance?` · World circumstance: ${esc(r.world_circumstance)}`:""}</span>`).join("")+`</div></div>`;
 if(Object.keys(v.world_flags||{}).length)h+=`<div class="card"><h3>World flags</h3><div class="row">`+Object.entries(v.world_flags).map(([k,val])=>`<span class="pill dim">${esc(k)}=${esc(String(val))}</span>`).join("")+`</div></div>`;
 const kn=v.knowledge||{},hasKnowledge=["claims","epistemics","facts","events"].some(k=>(kn[k]||[]).length);
 if(hasKnowledge){h+=`<div class="card"><h3>Claims &amp; Events <small>said, believed, true, and changed stay separate</small></h3>`;
  if((kn.claims||[]).length)h+=`<h4>What was said</h4>`+kn.claims.map(c=>`<div class="hint"><b>${esc(c.speaker||c.source||"source")}</b>${c.addressee?` to ${esc(c.addressee)}`:""} ${esc(c.class||"said")}: ${esc(c.proposition||c.proposition_id||"")}<br><small>${esc(c.polarity||"unspecified polarity")} · ${esc(c.modality||"unspecified modality")}</small></div>`).join("");
  if((kn.epistemics||[]).length)h+=`<h4>Who knows, believes, or doubts what</h4>`+kn.epistemics.map(e=>`<div class="hint"><b>${esc(e.holder||"actor")}</b> <span class="pill dim">${esc(e.stance||"believes")}</span>: ${esc(e.statement||e.proposition_id||"")}<br><small>evidence: ${esc(e.source||"not recorded")}</small></div>`).join("");
  if((kn.facts||[]).length)h+=`<h4>Accepted facts</h4>`+kn.facts.map(f=>`<div class="hint"><span class="pill ${f.status==="accepted"?"ok":"dim"}">${esc(f.status||"accepted")}</span> ${esc(f.statement||f.proposition_id||"")}<br><small>authority: ${esc(f.authority||"")} · cause: ${esc(f.cause||"not shown")}</small></div>`).join("");
  if((kn.events||[]).length)h+=`<h4>Admitted world events and history</h4>`+kn.events.map(e=>`<div class="hint"><span class="pill ${e.status==="active"?"vio":"dim"}">${esc(e.status||"")}</span> ${esc(e.what_happened||e.id||"")}<br><small>why: ${esc(e.cause_visible===true&&e.cause?e.cause:"cause not known")} · affected: ${esc((e.affected_domains||[]).join(", ")||"history only")}${e.relation_target?` · relates to ${esc(e.relation_target)}`:""}</small></div>`).join("");
  h+=`</div>`}
 if((v.consent||[]).length)h+=`<div class="card"><h3>Consent</h3>`+v.consent.map(c=>`<div class="row"><b style="font-weight:500">${esc(c.pair)}</b><span class="pill dim">${esc(c.category)}</span><span class="pill ${["granted","enthusiastic"].includes(c.level)?"ok":["hard_limit","withdrawn"].includes(c.level)?"bad":"warn"}">${esc(c.level)}</span>${c.cap!=null?`<span class="hint">≤${c.cap}</span>`:""}</div>`).join("")+`</div>`;
 if((v.memories||[]).length)h+=`<div class="card"><h3>Recent events</h3>`+v.memories.map(m=>`<div class="hint">t${m.turn} · ${esc(m.text)}</div>`).join("")+`</div>`;
 return h}
/* ---------- shell ---------- */
function nav(){$("#tabs").innerHTML=TABS.map(t=>
 `<button class="${t===tab?"on":""}" onclick="go('${t}')">${t}</button>`).join("")}
async function go(t){if(tab==="PlayerLex")playerLexReset();if(tab==="Player Lessons")playerLessonReset();
 tab=t;nav();if(t==="Player Lessons"||t==="PlayerLex"){S=null;J=null;headerRefresh();render();return}
 await load(PRIVILEGED_STATE_TABS.has(t));headerRefresh();render()}
async function render(){const v=$("#view"),renderTab=tab,seq=++RENDER_SEQ;let h;
 try{
  if(renderTab==="Player")h=playerView();
  else if(renderTab==="PlayerLex")h=await playerLexTab();
  else if(renderTab==="Player Lessons")h=await playerLessonsTab();
  else if(renderTab==="Overview")h=overview();
  else if(renderTab==="Edit")h=S?editTab():overview();
  else if(renderTab==="Sessions")h=await sessionsTab();
  else if(renderTab==="Connection")h=await connectionTab();
  else if(renderTab==="Status")h=await statusTab();
  else if(renderTab==="Models")h=await modelsTab();
  else if(renderTab==="Raw")h=HUD?.player_safe_raw?`<div class="card"><h3>Player-safe typed projection</h3><p class="hint">Owner/debug state and journal prose are intentionally excluded.</p><pre>${esc(JSON.stringify(HUD.player_safe_raw,null,2))}</pre></div>`:`<div class="card">No Player-safe projection is available.</div>`;
  if(seq===RENDER_SEQ&&tab===renderTab)v.innerHTML=h;
 }catch(e){if(seq===RENDER_SEQ&&tab===renderTab)v.innerHTML=`<div class="card"><span class="pill bad">error</span> ${esc(e)}</div>`}}
async function boot(){nav();await sessions();await load(false);headerRefresh();
 try{$("#ovr").checked=!!(await j("/aether/override")).enabled}catch(e){}
 render();
 timer=setInterval(async()=>{if((tab==="Overview"||tab==="Player")&&document.visibilityState==="visible"){
  const privileged=tab==="Overview",before=JSON.stringify(privileged?S:HUD);await sessions();await load(privileged);
  if(JSON.stringify(privileged?S:HUD)!==before){headerRefresh();render()}}},4000)}
boot();
</script>
