# AetherState configuration — copied to aetherstate-data/config.toml on first run.
# TIP: you don't have to edit this file at all. The Console
# (http://127.0.0.1:9130/aether/console) Connection tab fills in endpoints and
# keys for you and saves them here.

[server]
# host = "127.0.0.1"
# port = 9130

# ------------------------------------------------------------------
# MAIN model — the one that WRITES your story.
# base_url includes the version segment, same rule as SillyTavern custom endpoints.
[upstream]
base_url = ""     # e.g. "https://api.venice.ai/api/v1", "https://api.openai.com/v1",
                  #      "http://127.0.0.1:11434/v1" (Ollama), "http://127.0.0.1:5001/v1" (KoboldCpp)
model = ""        # DEFAULT model for engine-initiated calls only (Creator auto-fill, chat-open
                  # genesis) before any chat request has flowed. The relay NEVER uses it — your
                  # frontend names its own model per request. Set it from Console -> Connection.
api_key = ""      # FALLBACK ONLY. AetherState is a transparent proxy: the key your frontend
                  # (e.g. SillyTavern) sends in its connection profile is forwarded upstream
                  # AS-IS and ALWAYS WINS. This key is used ONLY when the frontend sends no
                  # Authorization header at all (rare — SillyTavern always sends one), plus for
                  # the Console's Connect test. So if you're getting 401s, fix the key in your
                  # frontend's connection profile, not here.
                  # SECURITY: a key set here is stored in plaintext. Prefer keeping it out
                  # of the file entirely via the env var  AETHERSTATE_UPSTREAM__API_KEY=sk-...
                  # (env overrides the file and is never written back to disk). The Console
                  # locks config.toml down on save — 0600 perms on POSIX, an owner-only NTFS
                  # ACL (icacls) on Windows — and still: keep it out of synced folders
                  # (OneDrive/Dropbox). The key is never echoed by any route or written to logs.

# ------------------------------------------------------------------
# HELPER model — the one that TRACKS state in the background.
# Can be the same service as above, or a small local model (Llama 3.1 8B is plenty).
[[assist.endpoints]]
name = "helper"
base_url = ""
api_key = ""
model = ""        # e.g. "zai-org-glm-5-2", or your local model's id
tier = "small"    # nano | small | medium — small keeps prompts compact for local 7-13B models
max_concurrent = 1

[assist.groups]
extraction = "assist"          # who tracks state: off | rules (no LLM) | main | assist
memory_reflection = "assist"
embeddings = "off"
linter_nli = "rules"
director_selection = "rules"
lore_gen = "off"

[extraction]
cadence_turns = 1     # update state every N turns (1 = every turn)
intake_chars = 12000  # how much recent chat each update reads (characters)
live_recalc = true    # true (default): the NEWEST reply is ingested the instant it finishes —
#                       its world-tags commit and extraction runs on its OWN turn. false = the
#                       old lag-1 behaviour (state reflected the reply BEFORE the last one).
# thinking = "auto"   # auto | on | off — reasoning models: off saves tokens, on buys quality

[manual_override]
enabled = false       # true = organic values (arousal, relationships, drives) become editable

[user_guard]
name = ""             # your persona's name — keeps the model from speaking in your voice

[consent]
safewords = []        # e.g. ["red"] — any of these in YOUR message freezes the scene instantly

# ------------------------------------------------------------------
# NARRATIVE MODE (Q27 / RPG specialization). Leave as "none" for normal chat-RP — that is
# byte-identical to not having this section at all. Set "rpg" to turn the character card
# into a Dungeon Master: it runs the world, NPCs and factions, YOUR character becomes a
# tracked Player Card ([PLAYER]/[QUEST] blocks appear), and the guard reframes to a
# Game-Master framing. Switch live with  /aether-spec rpg  (or the Console). When "rpg" a
# built-in profile fills defaults for other sections (e.g. injection priorities); anything
# you set below still wins.
[specialization]
name = "none"         # none | rpg
# blocks = ["PLAYER", "EFFECTS", "GEAR", "INVENTORY", "FACTIONS", "RELATIONS", "QUEST", "WORLD", "DIRECTIVE"]
# dm_guard = true     # Game-Master framing of the persona guard
# dice = "2d6"        # resolution dice (RPG-1): 2d6 | 3d6 | 2d10 | 1d20 (overrides the registry)
# tiers = "pbta3"     # resolution tier model (RPG-1)
# nemesis_enabled = false   # RPG-3b: turn on the single-nemesis linter guard (one_nemesis)
# faction_cascade = 0.1     # RPG-3b: NPC->faction affinity ripple (negatives halved; 0 = off)
# contract = "full"         # RPG-4: DM rules-contract size — "compact" for weak/local models
#                           # (same non-negotiables in ~40 tokens; part of the degradation ladder)
# hardcore = false          # RPG-5: defeat becomes DEATH (permadeath). Off = contextual
#                           # non-lethal outcomes (captured / wake safe / robbed / rescued)
# narrator_card_dir = ""    # optional: a SillyTavern characters dir (e.g.
#                           # ".../SillyTavern/data/default-user/characters"). When set, the
#                           # Creator's "Generate Narrator card" button installs a world-named
#                           # card there so you SEE which world you're playing; empty = the
#                           # browser just downloads the PNG for a manual Characters -> Import.
#
# RPG-4 location registry: under rpg, scene locations CANONICALIZE — a revisit under any name
# variant ("Gilded Lantern" vs "The Gilded Lantern") resolves to the same location entity
# (aliases learned automatically; visits counted); free prose pasted as a location is trimmed
# to its name head. Places the narrator invents are discovered and persisted ONCE (never
# regenerated). A `none` session is completely untouched by all of this.
#
# RPG-1 mechanics (curated stats/skills/abilities): declare an explicit skill-check inline with
#   ((aether.check <skill> [+N|-N] [vs DC] [scope minor|standard|major|epic|mythic]))
# The engine maps <skill> to the curated registry, rolls real dice, resolves a PbtA tier, and
# injects a [DIRECTIVE] the narrator must honour (the `outcome_match` linter rule flags a
# narration that contradicts the roll). Unknown skills are rejected — nothing freestyle. The
# shipped registry lives in the package (registry/*.toml); extend or override it per-table via
#   <data_dir>/registry/{meta,stats,skills,abilities,items,effects}.toml
#
# RPG-3b social plane: the player's standing with NPCs and factions is a reason-tagged ledger
# ([RELATIONS]/[FACTIONS] render the TIER label: Nemesis..Neutral..Devoted); world circumstances
# ride [WORLD]. In-chat edits (rpg only):
#   ((aether.set affinity.<name> <±N>))         — needs [manual_override] enabled
#   ((aether.set world.<key> <value|none>))     — none/null/clear removes the flag
#   ((aether.set player.soulmate <name|none>))  /  player.nemesis
# Soulmate/nemesis are unique bonds: promoting a new one demotes the incumbent (label kept).
